# This rule is not used by the project mcp-gateway itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants permissions to create, update, and delete resources within the mcp.kuadrant.io.
# This role is intended for users who need to manage these resources
# but should not control RBAC or manage permissions for others.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: mcp-gateway
    app.kubernetes.io/managed-by: kustomize
  name: mcpgatewayextension-editor-role
rules:
- apiGroups:
  - mcp.kuadrant.io
  resources:
  - mcpgatewayextensions
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - mcp.kuadrant.io
  resources:
  - mcpgatewayextensions/status
  verbs:
  - get
