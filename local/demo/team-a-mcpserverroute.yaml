apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  labels:
    mcp-server: "true"
  name: mcp-server3-a-route
  namespace: mcp-test
spec:
  hostnames:
  - server3.team-a.mcp.local
  parentRefs:
  - group: gateway.networking.k8s.io
    kind: Gateway
    name: team-a-gateway
    namespace: gateway-system
  rules:
  - backendRefs:
    - group: ""
      kind: Service
      name: mcp-test-server3
      port: 9090
      weight: 1
    matches:
    - path:
        type: PathPrefix
        value: /
